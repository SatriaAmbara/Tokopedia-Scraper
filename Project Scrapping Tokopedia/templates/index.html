<!doctype html>
<html>
  <head>
    <title>Tokopedia Scraper</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
      body {
        background: linear-gradient(135deg, #eef2f7, #dbe7f3);
        font-family: 'Segoe UI', Arial, sans-serif;
      }

      .card {
        border-radius: 16px;
        border: none;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      table {
        font-size: 13px;
      }

      tbody tr:hover {
        background: #f5f9ff;
      }

      /* TEXT BPS */
      .bps-text {
        font-family: 'Arial MT Pro', Arial, sans-serif;
        font-weight: bold;
        font-style: italic;
        color: #3a87cd;
        font-size: 16px;
        line-height: 1.2;
      }

      .logo-img {
        height: 55px;
      }

      .logo-tokped {
        height: 45px;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4">
      <!-- HEADER -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <!-- KIRI -->
        <div class="d-flex align-items-center gap-2">
          <img src="/static/tokped.png" class="logo-tokped" />
          <h4 class="mb-0">Tokopedia Scraper</h4>
        </div>

        <!-- KANAN -->
        <div class="d-flex align-items-center gap-1">
          <!-- LOGO BPS -->
          <img src="/static/bps.png" class="logo-img" />

          <!-- TEKS BPS (di kanan logo) -->
          <div class="bps-text">
            BADAN PUSAT STATISTIK<br />
            KABUPATEN KOTAWARINGIN BARAT
          </div>
        </div>
      </div>

      <!-- CONTROL PANEL -->
      <div class="card p-4 mb-3">
        <div class="row g-3">
          <div class="col-md-3">
            <label>Kab/Kota</label>
            <select id="city" class="form-select">
              {% for name, code in kota.items() %}
              <option value="{{code}}">{{name}}</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-2">
            <label>Max Page</label>
            <input type="number" id="max_page" class="form-control" value="5" />
          </div>

          <div class="col-md-2 d-grid">
            <label class="invisible">.</label>
            <button class="btn btn-success" onclick="start()">Start</button>
          </div>

          <div class="col-md-2 d-grid">
            <label class="invisible">.</label>
            <button class="btn btn-danger" onclick="stop()">Stop</button>
          </div>

          <div class="col-md-3 d-grid">
            <label class="invisible">.</label>
            <button class="btn btn-primary" onclick="downloadExcel()">Download</button>
          </div>
        </div>

        <div class="mt-3"><b>Status:</b> <span id="statusText">stop</span></div>
      </div>

      <!-- TABLE -->
      <div class="card p-3">
        <h5>Data Toko</h5>

        <table class="table table-hover table-sm">
          <thead>
            <tr>
              <th>No</th>
              <th>Domain</th>
              <th>Nama</th>
              <th>Kab/Kota</th>
              <th>Kecamatan</th>
              <th>Buka Sejak</th>
              <th>Produk Aktif</th>
            </tr>
          </thead>
          <tbody id="tbl"></tbody>
        </table>
      </div>
    </div>

    <script>
      function start() {
        let city = document.getElementById('city').value;
        let max_page = document.getElementById('max_page').value;

        fetch('/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            city: city,
            max_page: parseInt(max_page),
          }),
        });
      }

      function stop() {
        fetch('/stop');
      }

      function downloadExcel() {
        window.open('/download', '_blank');
      }

      setInterval(async () => {
        let data = await fetch('/data').then((r) => r.json());
        let status = await fetch('/status').then((r) => r.json());

        document.getElementById('statusText').innerText = status.status;

        let html = '';
        let no = 1;

        data.forEach((d) => {
          html += `
            <tr>
              <td>${no++}</td>
              <td>
                <a href="https://www.tokopedia.com/${d.domain}" target="_blank">
                  ${d.domain}
                </a>
              </td>
              <td>${d.shop_name}</td>
              <td>${d.city}</td>
              <td>${d.district}</td>
              <td>${d.open_since}</td>
              <td>${d.active_product}</td>
            </tr>
          `;
        });

        document.getElementById('tbl').innerHTML = html;
      }, 1500);
    </script>
  </body>
</html>
